<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — @social</title>
  <meta name="description" content="Sign in to @social and manage all your social media accounts from one powerful platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

  <div class="bg-layer">
    <div class="particle-field" id="particleField"></div>
    <div class="grid-overlay"></div>
    <div class="glow-orb glow-orb--1"></div>
    <div class="glow-orb glow-orb--2"></div>
  </div>

  <a href="index.html" class="auth-back">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to Home
  </a>

  <div class="auth-container">
    <div class="auth-brand">
      <a href="index.html" class="nav__logo">
        <div class="logo-icon">
          <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
            <path d="M16 2L4 8v8c0 7.18 5.16 13.9 12 15.93C23.84 29.9 29 23.18 29 16V8L16 2z" fill="url(#logoGradAuth)" />
            <path d="M10 16l4 4 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
            <defs>
              <linearGradient id="logoGradAuth" x1="4" y1="2" x2="29" y2="32" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6366f1" />
                <stop offset="1" stop-color="#06b6d4" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text"><span class="logo-accent">@social</span></span>
      </a>
    </div>

    <div class="auth-card" id="authCard">
      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab auth-tab--active" id="signinTab" data-tab="signin">Sign In</button>
        <button class="auth-tab" id="signupTab" data-tab="signup">Create Account</button>
        <div class="auth-tab-indicator" id="tabIndicator"></div>
      </div>

      <!-- Sign In Form -->
      <form class="auth-form" id="signinForm" novalidate>
        <div class="auth-form__header">
          <h1>Welcome back</h1>
          <p>Sign in to your @social workspace</p>
        </div>

        <div class="form-group">
          <label for="signinEmail">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="signinEmail" name="email" placeholder="you@company.com" autocomplete="email" required />
          </div>
          <span class="form-error" id="signinEmailError"></span>
        </div>

        <div class="form-group">
          <label for="signinPassword">
            Password
            <a href="#" class="form-label-link" id="forgotPasswordLink">Forgot password?</a>
          </label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signinPassword" name="password" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="input-toggle-pw" id="toggleSigninPw" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="form-error" id="signinPasswordError"></span>
        </div>

        <div class="form-group form-group--inline">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" />
            <span class="checkbox-custom"></span>
            Remember me for 30 days
          </label>
        </div>

        <button type="submit" class="btn btn--primary btn--full btn--auth" id="signinSubmit">
          <span class="btn-text">Sign In to Dashboard</span>
          <span class="btn-spinner" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          </span>
        </button>

        <div class="auth-divider"><span>or continue with</span></div>

        <div class="social-auth">
          <button type="button" class="social-auth__btn" id="googleAuthBtn">
            <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button type="button" class="social-auth__btn" id="microsoftAuthBtn">
            <svg viewBox="0 0 24 24"><path d="M0 0h11.5v11.5H0z" fill="#F25022"/><path d="M12.5 0H24v11.5H12.5z" fill="#7FBA00"/><path d="M0 12.5h11.5V24H0z" fill="#00A4EF"/><path d="M12.5 12.5H24V24H12.5z" fill="#FFB900"/></svg>
            Microsoft
          </button>
        </div>
      </form>

      <!-- Sign Up Form -->
      <form class="auth-form" id="signupForm" style="display:none" novalidate>
        <div class="auth-form__header">
          <h1>Get started free</h1>
          <p>Create your @social account in seconds</p>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="signupFirstName">First Name</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="signupFirstName" name="firstName" placeholder="John" autocomplete="given-name" required />
            </div>
            <span class="form-error" id="firstNameError"></span>
          </div>
          <div class="form-group">
            <label for="signupLastName">Last Name</label>
            <div class="input-wrapper">
              <input type="text" id="signupLastName" name="lastName" placeholder="Smith" autocomplete="family-name" required />
            </div>
            <span class="form-error" id="lastNameError"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="signupEmail">Work Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="signupEmail" name="email" placeholder="you@company.com" autocomplete="email" required />
          </div>
          <span class="form-error" id="signupEmailError"></span>
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signupPassword" name="password" placeholder="Create a strong password" autocomplete="new-password" required />
            <button type="button" class="input-toggle-pw" id="toggleSignupPw" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength" id="pwStrength">
            <div class="pw-strength__bar"><div class="pw-strength__fill" id="pwStrengthFill"></div></div>
            <span class="pw-strength__label" id="pwStrengthLabel">Enter a password</span>
          </div>
          <span class="form-error" id="signupPasswordError"></span>
        </div>

        <div class="form-group">
          <label for="signupCompany">Company / Agency Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <input type="text" id="signupCompany" name="company" placeholder="Your Agency Name" autocomplete="organization" />
          </div>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="agreeTerms" required />
            <span class="checkbox-custom"></span>
            I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a>
          </label>
          <span class="form-error" id="agreeTermsError"></span>
        </div>

        <button type="submit" class="btn btn--primary btn--full btn--auth" id="signupSubmit">
          <span class="btn-text">Create My Account</span>
          <span class="btn-spinner" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          </span>
        </button>

        <p class="auth-note">No credit card required. 14-day free trial on all plans.</p>
      </form>
    </div>

    <div class="auth-trust">
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>SOC2 Certified</span>
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span>256-bit Encryption</span>
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>99.9% Uptime</span>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
